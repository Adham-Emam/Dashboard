<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adham | Dashboard</title>
    <link rel="icon" href="images/icon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/framework.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="container d-flex">
      <section class="sidebar bg-white p-20 p-relative">
        <div class="title p-relative">
          <h3 class="p-relative text-center mt-0">
            A<span class="hide-mobile">dham</span>
          </h3>
        </div>
        <ul class="list-none p-0">
          <li>
            <a
              href="index.html"
              class="active d-flex align-center fs-14 c-black p-10"
              ><i class="fa-solid fa-chart-line fa-fw"></i
              ><span class="hide-mobile">Dashboard</span></a
            >
          </li>
          <li>
            <a href="index.html" class="d-flex align-center fs-14 c-black p-10"
              ><i class="fa-solid fa-gear fa-fw"></i
              ><span class="hide-mobile">Settings</span></a
            >
          </li>
          <li>
            <a href="index.html" class="d-flex align-center fs-14 c-black p-10"
              ><i class="fa-solid fa-user fa-fw"></i
              ><span class="hide-mobile">Profile</span></a
            >
          </li>
          <li>
            <a href="index.html" class="d-flex align-center fs-14 c-black p-10"
              ><i class="fa-solid fa-cubes fa-fw"></i
              ><span class="hide-mobile">Projects</span></a
            >
          </li>
          <li>
            <a href="index.html" class="d-flex align-center fs-14 c-black p-10"
              ><i class="fa-solid fa-list-check fa-fw"></i
              ><span class="hide-mobile">Courses</span></a
            >
          </li>
          <li>
            <a href="index.html" class="d-flex align-center fs-14 c-black p-10"
              ><i class="fa-solid fa-user-group fa-fw"></i
              ><span class="hide-mobile">Friends</span></a
            >
          </li>
          <li>
            <a href="index.html" class="d-flex align-center fs-14 c-black p-10"
              ><i class="fa-solid fa-file fa-fw"></i
              ><span class="hide-mobile">Files</span></a
            >
          </li>
          <li>
            <a href="index.html" class="d-flex align-center fs-14 c-black p-10"
              ><i class="fa-solid fa-credit-card fa-fw"></i
              ><span class="hide-mobile">Plans</span></a
            >
          </li>
        </ul>
      </section>
      <section class="content w-full">
        <header class="bg-white p-15 d-flex justify-between align-center">
          <div
            class="search hide-mobile p-relative d-flex justify-between align-center"
          >
            <input type="search" placeholder="Search" class="p-10 rad-6" />
            <i class="fa-solid fa-search"></i>
          </div>
          <div class="icons d-flex align-center ms-auto">
            <div class="notification p-relative">
              <i class="fa-solid fa-bell fa-lg"></i>
            </div>
            <img src="images/user.jpg" class="rad-half" alt="" />
          </div>
        </header>
      </section>
    </div>
  </body>
</html>
